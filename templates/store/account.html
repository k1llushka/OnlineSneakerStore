{% extends "base.html" %}

{% block title %}Аккаунт{% endblock %}

{% block content %}
<div class="login-wrapper fade-in-up">
    <div class="login-card">
        <h1>Редактирование аккаунта</h1>
        <p class="login-subtitle">Измените данные профиля и пароль.</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}

        <form method="post" class="login-form">
            {% csrf_token %}

            <label for="id_username">Логин</label>
            <div class="input-with-icon">
                <span class="input-icon"><svg class="icon"><use href="#icon-user"></use></svg></span>
                <input id="id_username" type="text" name="username" value="{{ request.user.username }}" required>
            </div>

            <label for="id_first_name">Имя</label>
            <input id="id_first_name" type="text" name="first_name" value="{{ request.user.first_name }}">

            <label for="id_last_name">Фамилия</label>
            <input id="id_last_name" type="text" name="last_name" value="{{ request.user.last_name }}">

            <label for="id_email">Email</label>
            <div class="input-with-icon">
                <span class="input-icon"><svg class="icon"><use href="#icon-card"></use></svg></span>
                <input id="id_email" type="email" name="email" value="{{ request.user.email }}">
            </div>

            <label for="id_current_password">Текущий пароль (обязательно при смене)</label>
            <div class="input-with-icon">
                <span class="input-icon"><svg class="icon"><use href="#icon-shield"></use></svg></span>
                <input id="id_current_password" type="password" name="current_password">
            </div>

            <label for="id_password">Новый пароль</label>
            <div class="input-with-icon">
                <span class="input-icon"><svg class="icon"><use href="#icon-shield"></use></svg></span>
                <input id="id_password" type="password" name="password">
            </div>

            <label for="id_password_confirm">Подтверждение нового пароля</label>
            <div class="input-with-icon">
                <span class="input-icon"><svg class="icon"><use href="#icon-shield"></use></svg></span>
                <input id="id_password_confirm" type="password" name="password_confirm">
            </div>

            <button type="submit" class="btn btn-primary login-submit">Сохранить изменения</button>
        </form>
    </div>
</div>
{% endblock %}
