{% extends "base.html" %}

{% block title %}Вход в аккаунт — SneakerStore{% endblock %}

{% block content %}
<div class="login-wrapper fade-in-up">
    <div class="login-card">
        <h1>Вход</h1>
        <p class="login-subtitle">Введите логин и пароль для входа.</p>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <p id="js-login-hint" class="validation-hint" style="display:none;"></p>
        <form method="post" class="login-form" id="js-login-form" novalidate>
            {% csrf_token %}
            <label for="id_username">Логин</label>
            <div class="input-with-icon">
                <span class="input-icon"><svg class="icon"><use href="#icon-user"></use></svg></span>
                <input id="id_username" type="text" name="username" required autocomplete="username">
            </div>

            <label for="id_password">Пароль</label>
            <div class="input-with-icon">
                <span class="input-icon"><svg class="icon"><use href="#icon-shield"></use></svg></span>
                <input id="id_password" type="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary login-submit">Войти</button>
        </form>
        <p class="form-note">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
    </div>
</div>
<script>
(function() {
    var form = document.getElementById('js-login-form');
    var hint = document.getElementById('js-login-hint');
    var username = document.getElementById('id_username');
    var password = form.querySelector('input[name="password"]');
    form.addEventListener('submit', function(e) {
        var u = username.value.trim();
        var p = password.value;
        hint.style.display = 'none';
        if (!u && !p) {
            hint.textContent = 'Введите логин и пароль.';
            hint.style.display = 'block';
            e.preventDefault();
            username.focus();
        } else if (!u) {
            hint.textContent = 'Заполните поле «Логин».';
            hint.style.display = 'block';
            e.preventDefault();
            username.focus();
        } else if (!p) {
            hint.textContent = 'Заполните поле «Пароль».';
            hint.style.display = 'block';
            e.preventDefault();
            password.focus();
        }
    });
})();
</script>
{% endblock %}
